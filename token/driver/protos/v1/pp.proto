syntax = "proto3";

package fabric_token_sdk.token.driver.v1;

option go_package = "github.com/hyperledger-labs/fabric-token-sdk/token/driver/protos-go/v1/pp";

// PublicParameters describes typed public parameters
message PublicParameters {
  string identifier = 1; // the identifier of the public parameters
  bytes raw = 2; // the actual public parameters to be interpreted depending on the identifier
}
