syntax = "proto3";

package fabric_token_sdk.token.fabtoken.v1;

import "common.proto";

option go_package = "github.com/hyperledger-labs/fabric-token-sdk/token/core/fabtoken/protos-go/v1/pp";

// PublicParameters describes typed public parameters
message PublicParameters {
  string token_driver_name = 1; // the name of the token driver
  uint32 token_driver_version = 2; // the version of token driver
  fabric_token_sdk.token.driver.v1.Identity auditor = 3; // is the public key of the auditor.
  repeated fabric_token_sdk.token.driver.v1.Identity issuers = 4; // is a list of public keys of the entities that can issue tokens.
  uint64 max_token = 5; // is the maximum quantity a token can hold
  uint64 quantity_precision = 6; // is the precision used to represent quantities
  map<string, bytes> metadata = 7; // metadata allows storing arbitrary application-specific or extension data in the public parameters. Keys should follow a reverse-DNS naming convention to avoid collisions (e.g., "com.example.myapp.custom_field").
}
